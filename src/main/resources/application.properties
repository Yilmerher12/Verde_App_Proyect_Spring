# Puerto donde corre la app
server.port=8080

# ===== CONEXIÓN A MYSQL =====
# Asegúrate de que el nombre después del 3306/ sea el mismo que creaste en el script SQL (verdeapp_2026)
spring.datasource.url=jdbc:mysql://localhost:3306/verdeapp_2026?createDatabaseIfNotExist=true&serverTimezone=UTC

# Tu usuario de MySQL (normalmente es root)
spring.datasource.username=root

# PONE AQUÍ TU CONTRASEŃA REAL DE MYSQL
# Si en tu PC MySQL tiene contraseńa, escríbela. Si no tiene, déjalo vacío.
spring.datasource.password=Yilmerher12_

# Configuración necesaria para que Hibernate no falle al detectar la versión
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver