# 1. Conexión a la Base de Datos (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/verde_app_spring
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configuración de Hibernate (JPA)
# 'update' hace que Hibernate cree las tablas si no existen o las actualice
spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola las sentencias SQL que Spring hace por ti
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. Puerto de la aplicación (Por defecto es 8080)
server.port=8080